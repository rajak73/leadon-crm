name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @leados/api prisma:generate

      - name: Type-check API
        run: pnpm --filter @leados/api exec tsc --noEmit -p tsconfig.json

      - name: Run API tests
        run: pnpm --filter @leados/api test

      - name: Build web
        run: pnpm --filter @leados/web build

      - name: Install Playwright browser + deps
        run: pnpm --filter @leados/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @leados/web e2e
